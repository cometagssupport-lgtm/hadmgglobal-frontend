<div class="page-container">
  <div class="banner">
    <app-top-nav></app-top-nav>
    <div class="banner-body">
      <div class="back-btn-wrap" (click)="goBack()">
        <img src="/leftarraow.svg" alt="back" style="filter: brightness(0) invert(1);" />
      </div>
      <h2>{{ 'Set Transaction Password' | translate }}</h2>
      <p>{{ 'Set a new password. Ensure it differs from previous ones for security.' | translate }}</p>
    </div>
  </div>

  <div class="form-container">
    <div>
      <div class="input-group">
        <label>{{ 'Set Transaction Password' | translate }}</label>
        <input 
          type="password" 
          [(ngModel)]="password" 
          placeholder="{{ 'Enter the Transaction Password' | translate }}" 
        />
      </div>
      
      <div class="input-group">
        <label>{{ 'Confirm Transaction Password' | translate }}</label>
        <input 
          type="password" 
          [(ngModel)]="confirmPassword" 
          placeholder="{{ 'Confirm Transaction Password' | translate }}" 
        />
      </div>
    </div>
  </div>

  <div class="bottom-buttons">
    <button class="primary-btn" (click)="updatePassword()">{{ 'Update password' | translate }}</button>
    <button class="secondary-btn" (click)="goBack()">{{ 'Cancel' | translate }}</button>
  </div>
</div>
